name: MAX INGEST 6-HR - nsf.gov

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ingest_nsf_gov.yml"
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: 6-Hour Deep Crawl & Ingest to Torus (nsf.gov)
        run: |
          echo "Starting maximum depth crawl of nsf.gov"
          echo "Timeout set to 5 hours 55 minutes to allow graceful exit..."
          timeout 21300 python3 tools/offline_ingest.py --target "nsf.gov" --mode max_depth
          
      - name: Upload Ingest Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ingest-data-nsf.gov
          path: output/*.bin
