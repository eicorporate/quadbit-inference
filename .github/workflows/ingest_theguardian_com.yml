name: MAX INGEST 6-HR - theguardian.com

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ingest_theguardian_com.yml"
  workflow_dispatch:
  schedule:
    - cron: '30 4 * * *'

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: 6-Hour Deep Crawl & Ingest to Torus (theguardian.com)
        run: |
          echo "Starting maximum depth crawl of theguardian.com"
          echo "Timeout set to 5 hours 55 minutes to allow graceful exit..."
          mkdir -p output
          echo "https://theguardian.com" > target.txt
          timeout 21300 python3 tools/offline_ingest.py --input target.txt --out output/ingest_theguardian_com.bin --crawl-subpages --max-depth 20 --max-total-pages 1000000 --max-pages-per-domain 500000 --push-endpoint "https://myjeffrey.com/api/memory/store" || true
          
      - name: Push Remaining Shards to Torus
        run: |
          python3 tools/push_shard_to_torus.py --shard-dir output/ --endpoint "https://myjeffrey.com/api/memory/store" || true

      - name: Upload Ingest Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ingest-data-theguardian_com
          path: output/*.bin
          if-no-files-found: ignore
