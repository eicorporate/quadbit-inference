name: quadbit-offline-ingest

on:
  push:
    branches: ["main"]
    paths:
      - "config/master_ingestion_urls.txt"
      - "tools/offline_ingest.py"
      - ".github/workflows/offline-ingest.yml"
  workflow_dispatch:
    inputs:
      shard_total:
        description: "How many parallel shards"
        required: false
        default: "32"
      max_parallel:
        description: "How many shard jobs to run concurrently"
        required: false
        default: "32"
      max_urls:
        description: "Max seed URLs to process (0 = all)"
        required: false
        default: "0"
      shard_size:
        description: "Records per output shard"
        required: false
        default: "800"
      max_depth:
        description: "Subpage crawl depth"
        required: false
        default: "4"
      max_pages_per_domain:
        description: "Safety cap per domain"
        required: false
        default: "500"
      max_total_pages:
        description: "Safety cap per shard"
        required: false
        default: "30000"

env:
  DEFAULT_SHARD_TOTAL: 32
  DEFAULT_MAX_PARALLEL: 32
  DEFAULT_SHARD_SIZE: 800
  DEFAULT_MAX_DEPTH: 4
  DEFAULT_MAX_PER_DOMAIN: 500
  DEFAULT_MAX_TOTAL_PAGES: 30000
  DEFAULT_MAX_URLS: 0
  TORUS_INGEST_ENDPOINT: https://myjeffrey.com/api/memory/store

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      shard_matrix: ${{ steps.mk.outputs.shard_matrix }}
    steps:
      - name: Build shard matrix
        id: mk
        run: |
          SHARD_TOTAL="${{ github.event.inputs.shard_total || env.DEFAULT_SHARD_TOTAL }}"
          python3 - <<'PY'
          import json, os
          total = int(os.environ.get('SHARD_TOTAL', '12'))
          total = max(1, min(total, 64))
          arr = list(range(total))
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write('shard_matrix=' + json.dumps(arr) + '\n')
          print('matrix_shards=', arr)
          PY
        env:
          SHARD_TOTAL: ${{ github.event.inputs.shard_total || env.DEFAULT_SHARD_TOTAL }}

  ingest:
    needs: build-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      max-parallel: 32
      matrix:
        shard: ${{ fromJson(needs.build-matrix.outputs.shard_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Prepare shard inputs
        run: |
          mkdir -p out/offline_batch tmp_seeds
          SHARD_TOTAL="${{ github.event.inputs.shard_total || env.DEFAULT_SHARD_TOTAL }}"
          INPUT_FILE="config/master_ingestion_urls_combined.txt"
          if [ ! -f "$INPUT_FILE" ]; then
            INPUT_FILE="config/master_ingestion_urls.txt"
          fi
          echo "Using input file: $INPUT_FILE"
          split -n l/${SHARD_TOTAL} -d "$INPUT_FILE" tmp_seeds/seed_
          shard_file=$(printf "tmp_seeds/seed_%02d" ${{ matrix.shard }})
          if [ ! -s "$shard_file" ]; then
            echo "Shard ${{ matrix.shard }} is empty; creating placeholder." >&2
            echo "" > "$shard_file"
          fi
          echo "SHARD_FILE=$shard_file" >> $GITHUB_ENV

      - name: Run offline ingest (shard ${{ matrix.shard }})
        run: |
          SHARD_TOTAL="${{ github.event.inputs.shard_total || env.DEFAULT_SHARD_TOTAL }}"
          MAX_URLS="${{ github.event.inputs.max_urls || env.DEFAULT_MAX_URLS }}"
          SHARD_SIZE="${{ github.event.inputs.shard_size || env.DEFAULT_SHARD_SIZE }}"
          MAX_DEPTH="${{ github.event.inputs.max_depth || env.DEFAULT_MAX_DEPTH }}"
          MAX_PER_DOMAIN="${{ github.event.inputs.max_pages_per_domain || env.DEFAULT_MAX_PER_DOMAIN }}"
          MAX_TOTAL="${{ github.event.inputs.max_total_pages || env.DEFAULT_MAX_TOTAL_PAGES }}"

          python tools/offline_ingest.py \
            --input "$SHARD_FILE" \
            --out out/offline_batch/shard_${{ matrix.shard }} \
            --max-urls "$MAX_URLS" \
            --shard-size "$SHARD_SIZE" \
            --max-depth "$MAX_DEPTH" \
            --max-pages-per-domain "$MAX_PER_DOMAIN" \
            --max-total-pages "$MAX_TOTAL" \
            --crawl-subpages \
            --push-endpoint "${{ env.TORUS_INGEST_ENDPOINT }}"

      - name: Upload shard artifact
        uses: actions/upload-artifact@v4
        with:
          name: quadbit-offline-batch-shard-${{ matrix.shard }}
          path: out/offline_batch/shard_${{ matrix.shard }}/

  merge-manifests:
    needs: ingest
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Create placeholder merge summary
        run: |
          echo "Manifests are produced per shard as part of the artifacts." > merge_summary.txt
      - name: Upload merge summary
        uses: actions/upload-artifact@v4
        with:
          name: quadbit-offline-merge-summary
          path: merge_summary.txt
