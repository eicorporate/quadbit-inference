name: quadbit-offline-ingest

on:
  push:
    branches: ["main"]
    paths:
      - "config/master_ingestion_urls.txt"
      - "tools/offline_ingest.py"
      - ".github/workflows/offline-ingest.yml"
  workflow_dispatch:
    inputs:
      max_urls:
        description: "Max URLs to process (0 = all)"
        required: false
        default: "0"
      shard_size:
        description: "Records per shard"
        required: false
        default: "200"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run offline ingest
        run: |
          mkdir -p out/offline_batch
          MAX_URLS="${{ github.event.inputs.max_urls }}"
          SHARD_SIZE="${{ github.event.inputs.shard_size }}"
          if [ -z "$MAX_URLS" ]; then MAX_URLS="0"; fi
          if [ -z "$SHARD_SIZE" ]; then SHARD_SIZE="200"; fi
          python tools/offline_ingest.py \
            --input config/master_ingestion_urls.txt \
            --out out/offline_batch \
            --max-urls "$MAX_URLS" \
            --shard-size "$SHARD_SIZE"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quadbit-offline-batch
          path: out/offline_batch/
