name: quadbit-offline-ingest

on:
  workflow_dispatch:
    inputs:
      max_urls:
        description: "Max URLs to process (0 = all)"
        required: false
        default: "0"
      shard_size:
        description: "Records per shard"
        required: false
        default: "200"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run offline ingest
        run: |
          mkdir -p out/offline_batch
          python tools/offline_ingest.py \
            --input config/seed_urls.txt \
            --out out/offline_batch \
            --max-urls "${{ github.event.inputs.max_urls }}" \
            --shard-size "${{ github.event.inputs.shard_size }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quadbit-offline-batch
          path: out/offline_batch/
