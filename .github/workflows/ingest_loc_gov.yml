name: MAX INGEST 6-HR - loc.gov

on:
  push:
    branches:
      - main
  push:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/ingest_*.yml"
      - "config/*"
  schedule:
    - cron: '0 * * * *' # Can be adjusted or triggered via API
  push:

jobs:
  ingest:
    runs-on: ubuntu-latest
  push:
    timeout-minutes: 360 # Max out the 6-hour limit exactly
    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
  push:

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: 6-Hour Deep Crawl & Ingest to Torus (loc.gov)
        run: |
          echo "Starting maximum depth crawl of loc.gov"
          echo "Timeout set to 5 hours 55 minutes to allow graceful exit..."
          # Running the crawler with a 21300 second timeout (5.9 hours)
          timeout 21300 python3 tools/offline_ingest.py --target "loc.gov" --mode max_depth
          
      - name: Upload Ingest Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ingest-data-loc.gov
          path: output/*.bin
