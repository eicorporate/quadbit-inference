name: MAX INGEST 6-HR - wikipedia.org

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ingest_wikipedia_org.yml"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: 6-Hour Deep Crawl & Ingest to Torus (wikipedia.org)
        run: |
          echo "Starting maximum depth crawl of wikipedia.org"
          echo "Timeout set to 5 hours 55 minutes to allow graceful exit..."
          timeout 21300 python3 tools/offline_ingest.py --target "wikipedia.org" --mode max_depth || true
          
      - name: Upload Ingest Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ingest-data-wikipedia.org
          path: output/*.bin
          if-no-files-found: ignore
